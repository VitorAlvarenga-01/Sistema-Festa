<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sistema de Festas</title>
<style>
  :root {
    --night: #1B2A41;
    --night-light: #28405c;
    --bonfire: #E8762C;
    --corn: #F4B942;
    --gingham: #C23B33;
    --leaf: #3D7A52;
    --bg: #FFFBF2;
    --border: #E7E0D2;
    --radius: 14px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    min-height: 100vh;
    background: var(--night);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: -apple-system, "Segoe UI", Roboto, system-ui, sans-serif;
    padding: 24px;
  }

  /* tira de bandeirinhas no topo */
  .bandeirinhas {
    position: fixed;
    top: 0; left: 0; right: 0;
    height: 16px;
    display: flex;
    z-index: 10;
  }
  .bandeirinhas span {
    flex: 1; height: 0;
    border-left: 10px solid transparent;
    border-right: 10px solid transparent;
    border-top: 16px solid var(--bonfire);
  }
  .bandeirinhas span:nth-child(4n+2) { border-top-color: var(--corn); }
  .bandeirinhas span:nth-child(4n+3) { border-top-color: var(--leaf); }
  .bandeirinhas span:nth-child(4n+4) { border-top-color: var(--gingham); }

  .logo {
    font-size: 3.5rem;
    margin-bottom: 12px;
  }

  h1 {
    color: var(--corn);
    font-size: 1.6rem;
    font-weight: 800;
    letter-spacing: 0.02em;
    text-align: center;
    margin-bottom: 6px;
  }

  .subtitulo {
    color: #9fb0c6;
    font-size: 0.92rem;
    text-align: center;
    margin-bottom: 48px;
  }

  .cards {
    display: flex;
    gap: 24px;
    flex-wrap: wrap;
    justify-content: center;
  }

  .card-acesso {
    background: var(--night-light);
    border: 2px solid #2e4a6a;
    border-radius: var(--radius);
    padding: 36px 32px;
    text-align: center;
    width: 240px;
    cursor: pointer;
    text-decoration: none;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 14px;
    transition: transform 0.12s ease, border-color 0.12s ease;
  }
  .card-acesso:hover {
    transform: translateY(-4px);
  }
  .card-acesso.pdv { border-color: var(--bonfire); }
  .card-acesso.pdv:hover { background: #2e3a1e; border-color: var(--leaf); }
  .card-acesso.admin { border-color: #2e4a6a; }
  .card-acesso.admin:hover { background: #1e2e42; border-color: var(--corn); }

  .card-icone {
    font-size: 3rem;
    line-height: 1;
  }

  .card-titulo {
    font-size: 1.1rem;
    font-weight: 800;
    color: #fff;
    letter-spacing: 0.02em;
  }

  .card-desc {
    font-size: 0.82rem;
    color: #9fb0c6;
    line-height: 1.5;
  }

  .card-acesso.pdv .card-titulo { color: var(--leaf); }
  .card-acesso.admin .card-titulo { color: var(--corn); }

  .card-btn {
    margin-top: 6px;
    padding: 10px 24px;
    border: none;
    border-radius: 8px;
    font-weight: 700;
    font-size: 0.9rem;
    cursor: pointer;
    width: 100%;
  }
  .card-acesso.pdv .card-btn { background: var(--leaf); color: #fff; }
  .card-acesso.admin .card-btn { background: var(--corn); color: var(--night); }

  .rodape {
    margin-top: 48px;
    color: #4a6080;
    font-size: 0.78rem;
    text-align: center;
  }
</style>
</head>
<body>

<div class="bandeirinhas" id="bandeirinhas"></div>

<div class="logo">🌽</div>
<h1>Sistema de Festas</h1>
<p class="subtitulo">Selecione o tipo de acesso para continuar</p>

<div class="cards">

  <a href="pdv.html" class="card-acesso pdv">
    <div class="card-icone">🏪</div>
    <div class="card-titulo">PDV</div>
    <div class="card-desc">Operador de caixa<br>Registrar vendas e fechamento</div>
    <button class="card-btn">Acessar PDV</button>
  </a>

  <a href="admin.html" class="card-acesso admin">
    <div class="card-icone">⚙️</div>
    <div class="card-titulo">Admin</div>
    <div class="card-desc">Administrador<br>Dashboard, produtos e relatórios</div>
    <button class="card-btn">Acessar Admin</button>
  </a>

</div>

<div class="rodape">
  Sistema de Gestão de Festas · Open Source
</div>

<script>
  // monta a tira de bandeirinhas
  const tira = document.getElementById("bandeirinhas");
  for (let i = 0; i < 30; i++) tira.appendChild(document.createElement("span"));
</script>

</body>
</html>
